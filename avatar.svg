<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 380" width="100%" height="100%">
  <style>
    .mouth { transition: d 0.08s ease; }
    .eye { transition: ry 0.1s ease; }
    .glow { transition: r 0.3s ease, opacity 0.3s ease; }
    .speaking .glow { animation: glowPulse 1.5s ease-in-out infinite; }
    @keyframes glowPulse { 0%,100% { r:58; opacity:0.3 } 50% { r:68; opacity:0.5 } }
    .blink .eye { ry: 2; }
    .head-group { transition: transform 0.5s ease; }
    @keyframes idleSway { 0%,100% { transform: translate(0,0) } 50% { transform: translate(0,2px) } }
    .idle .head-group { animation: idleSway 4s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D1B1B"/><stop offset="40%" stop-color="#3D2525"/><stop offset="100%" stop-color="#2D1B1B"/>
    </linearGradient>
    <radialGradient id="sg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF0EB"/><stop offset="100%" stop-color="#F5D5C8"/>
    </radialGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E87D8A"/><stop offset="100%" stop-color="#D4606D"/>
    </linearGradient>
    <linearGradient id="shg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/><stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#B0B0B0"/>
    </linearGradient>
  </defs>

  <circle cx="125" cy="140" r="115" fill="#FDF2F5"/>

  <g class="head-group">
    <!-- Hair -->
    <path d="M65,65 Q60,20 100,10 Q125,5 150,12 Q185,22 185,65 L185,140 Q185,155 175,165 L185,185 Q185,200 175,210 Q165,195 170,175 Q175,155 170,140 L168,130 Q170,100 165,68 Z" fill="url(#hg)"/>
    <path d="M68,65 Q62,40 65,20 Q68,38 72,65 Z" fill="#4A3030" opacity="0.4"/>
    <path d="M70,100 Q60,120 55,150 Q58,130 68,105 Z" fill="url(#hg)"/>
    <path d="M70,130 Q58,160 55,195 Q62,165 73,135 Z" fill="url(#hg)"/>
    <path d="M180,100 Q190,125 195,155 Q188,130 178,105 Z" fill="url(#hg)"/>
    <path d="M178,130 Q192,165 195,200 Q186,170 175,138 Z" fill="url(#hg)"/>
    <ellipse cx="125" cy="85" rx="52" ry="62" fill="url(#sg)"/>
    <!-- Bangs -->
    <path d="M73,60 Q72,28 88,22 Q95,18 105,20 Q108,15 118,16 Q125,10 132,16 Q142,15 145,20 Q155,18 162,22 Q178,28 177,60 Q175,50 160,45 Q150,55 135,52 Q125,58 115,52 Q100,55 90,45 Q75,50 73,60 Z" fill="url(#hg)"/>
    <!-- Blush -->
    <ellipse cx="95" cy="98" rx="12" ry="7" fill="#FFB6C1" opacity="0.3"/>
    <ellipse cx="155" cy="98" rx="12" ry="7" fill="#FFB6C1" opacity="0.3"/>
    <!-- Eyebrows -->
    <path d="M88,72 Q100,68 115,72" stroke="#3D2525" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M135,72 Q150,68 162,72" stroke="#3D2525" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Left eye -->
    <ellipse cx="107" cy="85" rx="12" ry="7" fill="white" class="eye"/>
    <circle cx="107" cy="85" r="6" fill="#3D2010"/><circle cx="107" cy="85" r="3.5" fill="#1A0A00"/><circle cx="109" cy="83" r="2" fill="white"/>
    <!-- Right eye -->
    <ellipse cx="143" cy="85" rx="12" ry="7" fill="white" class="eye"/>
    <circle cx="143" cy="85" r="6" fill="#3D2010"/><circle cx="143" cy="85" r="3.5" fill="#1A0A00"/><circle cx="145" cy="83" r="2" fill="white"/>
    <!-- Nose -->
    <path d="M125,92 Q120,102 122,108 Q125,110 128,108 Q130,102 125,92" fill="#F0C8B8" opacity="0.5"/>
    <ellipse cx="125" cy="96" rx="2" ry="3" fill="white" opacity="0.3"/>
    <!-- Mouth -->
    <g transform="translate(125,120)">
      <path class="mouth" d="M-8,2 Q0,2.5 8,2" fill="url(#lg)" stroke="#D4606D" stroke-width="0.8"/>
      <path d="M-3,0 Q0,2 3,0" stroke="#C05060" stroke-width="0.5" fill="none" opacity="0.4"/>
    </g>
    <!-- Necklace -->
    <path d="M95,137 Q110,148 125,150 Q140,148 155,137" stroke="url(#svg)" stroke-width="1.5" fill="none"/>
    <path d="M125,153 Q125,148 128,145 Q131,142 133.5,145 Q136,148 136,153 Q136,158 125,165 Q114,158 114,153 Q114,148 116.5,145 Q119,142 122,145 Q124,148 125,153 Z" fill="#E8E8E8" stroke="#C0C0C0" stroke-width="0.5"/>
    <ellipse cx="122" cy="149" rx="1.5" ry="1" fill="white" opacity="0.5"/>
    <!-- Glow ring -->
    <circle class="glow" cx="125" cy="85" r="58" fill="none" stroke="#FF8FAA" stroke-width="1.5" opacity="0"/>
  </g>

  <!-- Body -->
  <rect x="112" y="140" width="26" height="18" rx="8" fill="url(#sg)"/>
  <path d="M78,185 Q60,195 50,240 Q48,270 55,310 L100,310 Q95,280 92,255 Q88,225 90,200 Z" fill="url(#shg)" stroke="#D8D8D8" stroke-width="0.5"/>
  <path d="M172,185 Q190,195 200,240 Q202,270 195,310 L150,310 Q155,280 158,255 Q162,225 160,200 Z" fill="url(#shg)" stroke="#D8D8D8" stroke-width="0.5"/>
  <path d="M112,155 L95,185 L112,168 L125,175 L138,168 L155,185 L138,155" fill="url(#shg)" stroke="#D0D0D0" stroke-width="0.8"/>
  <path d="M95,185 L98,195 L102,188" fill="white" stroke="#D0D0D0" stroke-width="0.5"/>
  <path d="M155,185 L152,195 L148,188" fill="white" stroke="#D0D0D0" stroke-width="0.5"/>
  <circle cx="125" cy="195" r="2" fill="#D8D8D8"/><circle cx="125" cy="220" r="2" fill="#D8D8D8"/><circle cx="125" cy="245" r="2" fill="#D8D8D8"/>
  <rect x="115" y="170" width="20" height="20" rx="5" fill="#F5F5F5" opacity="0.8"/>

  <!-- Hands + Photo -->
  <g transform="translate(8,-2) rotate(-3 125 306)">
    <rect x="95" y="270" width="60" height="72" rx="3" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
    <rect x="101" y="278" width="48" height="48" rx="2" fill="#2A2A3A"/>
    <circle cx="115" cy="295" r="6" fill="#D4A574"/><circle cx="125" cy="290" r="5" fill="#8B6B4A"/><circle cx="135" cy="295" r="6" fill="#C49470"/>
    <rect x="118" y="300" width="14" height="10" rx="1" fill="#6B4423" opacity="0.6"/>
  </g>
  <rect x="82" y="285" width="22" height="16" rx="8" fill="url(#sg)" transform="rotate(5 90 295)"/>
  <ellipse cx="80" cy="282" rx="3" ry="7" fill="url(#sg)" transform="rotate(-10 80 282)"/>
  <ellipse cx="76" cy="280" rx="3" ry="7" fill="url(#sg)" transform="rotate(-20 76 280)"/>
  <rect x="78" y="296" width="18" height="8" rx="4" fill="url(#sg)" transform="rotate(5 87 300)"/>
  <line x1="78" y1="298" x2="98" y2="298" stroke="#8B4513" stroke-width="2.5" transform="rotate(5 88 298)"/>
  <circle cx="83" cy="297" r="2" fill="#A0522D" transform="rotate(5 88 298)"/>
  <circle cx="88" cy="297" r="2" fill="#8B4513" transform="rotate(5 88 298)"/>
  <circle cx="93" cy="297" r="2" fill="#A0522D" transform="rotate(5 88 298)"/>
  <rect x="140" y="288" width="22" height="16" rx="8" fill="url(#sg)" transform="rotate(-8 155 296)"/>
  <ellipse cx="168" cy="285" rx="3" ry="7" fill="url(#sg)" transform="rotate(10 168 285)"/>
  <ellipse cx="172" cy="283" rx="3" ry="7" fill="url(#sg)" transform="rotate(20 172 283)"/>
  <rect x="142" y="300" width="18" height="8" rx="4" fill="url(#sg)" transform="rotate(-8 151 304)"/>
</svg>